<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Akıllı Şikayet Yazıcı</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  width: 720px;
  background: #020617;
  padding: 25px;
  border-radius: 16px;
}

input, select, textarea, button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  cursor: pointer;
}

textarea {
  height: 180px;
}
</style>
</head>

<body>

<div class="box">
<h2>🧠 Akıllı Şikayet Yazıcı</h2>

<select id="kategori">
  <option value="ucak">Uçak Bileti</option>
  <option value="servis">Teknik Servis</option>
  <option value="kargo">Kargo</option>
</select>

<input id="detay" placeholder="Özel detay yaz (örn: kedimle seyahat edecektim, izin verilmedi)">

<button onclick="uret()">Metin Üret & Kopyala</button>

<textarea id="out" readonly></textarea>

</div>

<script>

const senaryolar = {
  ucak: [
    "uçuşumla ilgili sorun yaşadım",
    "biletimle ilgili beklenmedik bir durum oluştu",
    "rezervasyon sürecinde ciddi bir problemle karşılaştım"
  ],
  servis: [
    "cihazımın tamiri için başvurdum",
    "servis sürecinde sorun yaşadım",
    "onarım işlemi sırasında problem çıktı"
  ],
  kargo: [
    "gönderim sürecinde sorun yaşadım",
    "teslimat beklediğim gibi gerçekleşmedi",
    "kargo sürecinde ciddi aksaklıklar oldu"
  ]
};

const sorunlar = {
  ucak: [
    "bana verilen bilgiler ile yaşadığım durum tamamen farklıydı",
    "söylenen koşullar sonradan geçerli olmadı",
    "hizmet beklentimin çok altında kaldı"
  ],
  servis: [
    "başta söylenen ile sonradan yapılan işlemler uyuşmadı",
    "ücretlendirme tamamen değiştirildi",
    "süreç şeffaf şekilde ilerlemedi"
  ],
  kargo: [
    "teslimat süreci kontrolsüz ilerledi",
    "bilgilendirme yapılmadı",
    "paketin durumu hakkında net bilgi verilmedi"
  ]
};

function r(a){return a[Math.floor(Math.random()*a.length)]}

function uret(){
  let kat = document.getElementById("kategori").value;
  let detay = document.getElementById("detay").value;

  let metin = `
${r(senaryolar[kat])}. 
Başlangıçta her şey normal görünüyordu ancak süreç ilerledikçe sorunlar ortaya çıkmaya başladı. 
${r(sorunlar[kat])}. 
${detay ? detay + "." : ""}
Bu durum karşısında çözüm bulmaya çalıştım ancak herhangi bir geri dönüş alamadım. 
Yaşadığım bu deneyim ciddi bir mağduriyet oluşturdu ve sürecin bu şekilde ilerlemesi kabul edilebilir değil.
`;

  document.getElementById("out").value = metin;
  navigator.clipboard.writeText(metin);
}

</script>

</body>
</html>
