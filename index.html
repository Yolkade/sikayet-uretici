
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şikayet Metni Üretici PRO</title>
<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  width:650px;
}
input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
button {
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
}
textarea {
  width:100%;
  height:200px;
  margin-top:15px;
  border-radius:8px;
  padding:10px;
}
</style>
</head>

<body>
<div class="box">
  <h2>🔥 Şikayet Metni Üretici</h2>

  <input id="konu" placeholder="Şikayet konusu (örn: beyaz eşya servisi)">
  <input id="min" type="number" placeholder="Minimum karakter (örn: 400)">
  <input id="max" type="number" placeholder="Maksimum karakter (örn: 900)">

  <button onclick="uret()">Metin Üret & Kopyala</button>

  <textarea id="out" readonly></textarea>
</div>

<script>
const giris = [
  "Google üzerinden ulaştığım bu {konu}",
  "İnternette yaptığım arama sonucunda bulduğum bu {konu}",
  "Google reklamları sayesinde karşıma çıkan bu {konu}",
  "Acil ihtiyaç nedeniyle ulaştığım bu {konu}",
  "Yetkili servis sandığım bu {konu}"
];

const orta = [
  "başlangıçta güven verici bir izlenim oluşturdu.",
  "kendini yetkili servis gibi tanıttı.",
  "reklamlarında resmi servis algısı yarattı.",
  "ilk görüşmede profesyonel bir yaklaşım sergiledi.",
  "başta normal bir hizmet sunuyor gibi görünüyordu."
];

const olay = [
  "Cihaz teslim edildikten sonra beklenenden çok daha yüksek bir ücret talep edildi.",
  "Başlangıçta söylenen fiyat sonradan ciddi şekilde artırıldı.",
  "Süreç ilerledikçe arıza büyütülerek maliyet yükseltildi.",
  "İlk belirtilen ücret ile sonradan istenen tutar arasında büyük fark oluştu.",
  "Sonradan farklı gerekçelerle ek ücretler çıkarıldı."
];

const sonuc = [
  "Ödeme yapıldıktan sonra iletişim tamamen kesildi.",
  "Ödeme sonrası firmaya ulaşmak mümkün olmadı.",
  "Telefonlara cevap verilmemeye başlandı.",
  "Cihaz geri verilmedi ve süreç belirsiz kaldı.",
  "Hiçbir şekilde geri dönüş alamadım."
];

const bitis = [
  "Bu durum açıkça yanıltıcıdır.",
  "Benzer mağduriyetlerin yaşanmaması için incelenmelidir.",
  "Reklamlarının denetlenmesi gerektiğini düşünüyorum.",
  "Kullanıcılar açısından riskli bir durumdur.",
  "Bu tür uygulamaların önüne geçilmelidir."
];

function r(a){return a[Math.floor(Math.random()*a.length)]}

function uret(){
  let konu = document.getElementById("konu").value || "servis";
  let min = parseInt(document.getElementById("min").value) || 300;
  let max = parseInt(document.getElementById("max").value) || 900;

  let metin = "";

  while(metin.length < min){
    let cumle = `${r(giris).replace("{konu}",konu)} ${r(orta)} ${r(olay)} ${r(sonuc)} ${r(bitis)} `;
    metin += cumle;
  }

  if(metin.length > max){
    metin = metin.substring(0,max);
  }

  document.getElementById("out").value = metin;

  navigator.clipboard.writeText(metin);
}
</script>

</body>
</html>
